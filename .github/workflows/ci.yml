name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

defaults:
  run:
    working-directory: startup-48-human-centered-to-do-web-app-design-thinking-plan-

jobs:
  # ── 1. Type check + Unit + Snapshot tests ────────────────────────────────────
  unit-tests:
    name: Unit, Integration & Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit + snapshot tests
        run: npx jest --no-coverage --ci
      - name: Verify snapshot count
        run: |
          SNAPS=$(find __tests__/snapshots/__snapshots__ -name "*.snap" | wc -l)
          echo "Snapshot files: $SNAPS"
          [ "$SNAPS" -ge 2 ] || (echo "Expected ≥2 snapshot files" && exit 1)

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Next.js Build (Turbopack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify route count
        run: |
          COUNT=$(npm run build 2>&1 | grep "^[├└]" | wc -l || echo "0")
          echo "Routes: $COUNT"
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.next
          retention-days: 1

  # ── 3. E2E — 5 core flows (Chromium) ─────────────────────────────────────────
  e2e-core:
    name: E2E Core Flows
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.next
      - name: Run core E2E tests
        run: |
          npx playwright test \
            e2e/auth.spec.ts \
            e2e/capture-flow.spec.ts \
            e2e/today-view.spec.ts \
            e2e/settings-data.spec.ts \
            e2e/pwa-offline.spec.ts \
            --project=chromium \
            --reporter=line,json
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}
      - name: Verify E2E pass rate ≥ 99%
        run: |
          TOTAL=$(cat playwright-report/results.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['stats']['expected'])")
          FAIL=$(cat playwright-report/results.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['stats']['unexpected'])")
          RATE=$(python3 -c "print(round(($TOTAL-$FAIL)/$TOTAL*100,1))")
          echo "E2E pass rate: ${RATE}% (${FAIL} failures / ${TOTAL} tests)"
          [ "$FAIL" -eq 0 ] || (echo "❌ E2E pass rate below 99%" && exit 1)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-core
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/playwright-report
          retention-days: 7

  # ── 4. Visual Regression Tests ────────────────────────────────────────────────
  e2e-visual:
    name: Visual Regression (Chromium)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.next
      - name: Run visual regression tests
        run: |
          npx playwright test e2e/visual/ \
            --project=visual \
            --reporter=line,html
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-visual
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/playwright-report
          retention-days: 14

  # ── 5. Accessibility E2E ──────────────────────────────────────────────────────
  e2e-a11y:
    name: Accessibility E2E (axe-core)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.next
      - name: Run accessibility tests
        run: |
          npx playwright test e2e/accessibility.spec.ts \
            --project=chromium \
            --reporter=line
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

  # ── 6. Lighthouse CI ──────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "startup-48-human-centered-to-do-web-app-design-thinking-plan-/package-lock.json"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.next
      - run: npm install -g @lhci/cli
      - name: Start app
        run: npx next start -p 3000 &
        env:
          NODE_ENV: production
      - run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: startup-48-human-centered-to-do-web-app-design-thinking-plan-/.lighthouseci
          retention-days: 7
